<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Moringai Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:Inter,sans-serif;background:#f0f4f0;color:#1a3a1a;min-height:100vh}
        .admin-header{background:#1b4332;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
        .admin-header h1{font-size:20px;font-weight:700}
        .admin-header a{color:#fff;text-decoration:none;font-size:14px;opacity:0.8}
        .admin-body{max-width:1100px;margin:0 auto;padding:32px 16px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
        .stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        .stat-card .num{font-size:28px;font-weight:700;color:#1b4332}
        .stat-card .lbl{font-size:13px;color:#666;margin-top:4px}
        h2{font-size:18px;font-weight:700;margin-bottom:16px;color:#1b4332}
        .orders-table{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:auto}
        table{width:100%;border-collapse:collapse;min-width:600px}
        th{background:#1b4332;color:#fff;padding:12px 16px;text-align:left;font-size:13px;font-weight:600}
        td{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:top}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#f8fdf8}
        .status{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
        .status.confirmed{background:#d1fae5;color:#065f46}
        .empty{text-align:center;padding:48px;color:#999}
        .refresh-btn{background:#1b4332;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-family:Inter,sans-serif}
        .items-list{font-size:12px;color:#555}
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>♦️ Moringai — Order Dashboard</h1>
        <div style="display:flex;align-items:center;gap:16px">
            <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
            <a href="/">← Back to Site</a>
        </div>
    </div>
    <div class="admin-body">
        <div class="stats">
            <div class="stat-card"><div class="num" id="totalOrders">—</div><div class="lbl">Total Orders</div></div>
            <div class="stat-card"><div class="num" id="totalRevenue">—</div><div class="lbl">Total Revenue</div></div>
            <div class="stat-card"><div class="num" id="todayOrders">—</div><div class="lbl">Today's Orders</div></div>
            <div class="stat-card"><div class="num" id="avgOrder">—</div><div class="lbl">Avg Order Value</div></div>
        </div>
        <h2>All Orders</h2>
        <div class="orders-table">
            <table>
                <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
                <tbody id="ordersBody"><tr><td colspan="7" class="empty">Loading orders...</td></tr></tbody>
            </table>
        </div>
    </div>
    <script>
    async function loadOrders() {
        try {
            const res = await fetch('/api/orders');
            const data = await res.json();
            const orders = (data.orders || []).reverse();
            const tbody = document.getElementById('ordersBody');
            if (!orders.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty">No orders yet. 🛒</td></tr>';
                ['totalOrders','totalRevenue','todayOrders','avgOrder'].forEach(id => document.getElementById(id).textContent = id==='totalRevenue'||id==='avgOrder'?'₹0':'0');
                return;
            }
            const today = new Date().toDateString();
            const todayCount = orders.filter(o => new Date(o.createdAt).toDateString() === today).length;
            const totalRev = orders.reduce((s,o) => s + (o.total||0), 0);
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('totalRevenue').textContent = '₹' + totalRev.toLocaleString('en-IN');
            document.getElementById('todayOrders').textContent = todayCount;
            document.getElementById('avgOrder').textContent = '₹' + Math.round(totalRev / orders.length);
            tbody.innerHTML = orders.map(o => {
                const c = o.customer || {};
                const name = c.name || o.customer || '—';
                const phone = c.phone || '—';
                const items = (o.items||[]).map(i => i.name + ' x' + i.qty).join(', ');
                const date = new Date(o.createdAt).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
                return `<tr><td style="font-weight:600;color:#1b4332">${o.id||'—'}</td><td><div style="font-weight:600">${name}</div><div style="color:#888;font-size:12px">${phone}</div></td><td><div class="items-list">${items}</div></td><td style="font-weight:700;color:#1b4332">₹${(o.total||0).toLocaleString('en-IN')}</td><td>${o.paymentMethod==='razorpay'?'💳 Online':'💵 COD'}</td><td><span class="status confirmed">${o.status||'confirmed'}</span></td><td style="color:#888">${date}</td></tr>`;
            }).join('');
        } catch(e) {
            document.getElementById('ordersBody').innerHTML = '<tr><td colspan="7" class="empty">Error loading orders.</td></tr>';
        }
    }
    loadOrders();
    setInterval(loadOrders, 30000);
    </script>
</body>
</html>
